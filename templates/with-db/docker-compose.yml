services:
  db:
    image: postgres:16-alpine
    container_name: "{{PROJECT_NAME}}-db"
    ports:
      - "{{PORT_DB}}:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB={{PROJECT_NAME}}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: "{{PROJECT_NAME}}-backend"
    ports:
      - "{{PORT_BACKEND}}:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGIN=http://localhost:{{PORT_FRONTEND}}
      - DATABASE_URL="postgres://postgres:postgres@db:5432/{{PROJECT_NAME}}?sslmode=disable"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: "{{PROJECT_NAME}}-frontend"
    ports:
      - "{{PORT_FRONTEND}}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
