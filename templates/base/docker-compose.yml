services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: "{{PROJECT_NAME}}-backend"
    ports:
      - "{{PORT_BACKEND}}:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGIN=http://localhost:{{PORT_FRONTEND}}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: "{{PROJECT_NAME}}-frontend"
    ports:
      - "{{PORT_FRONTEND}}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
