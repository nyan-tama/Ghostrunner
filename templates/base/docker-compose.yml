services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: {{PROJECT_NAME}}-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGIN=http://localhost:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: {{PROJECT_NAME}}-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
