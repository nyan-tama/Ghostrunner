steps:
  # Backend: Build and push Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}-backend"
      - "./backend"

  # Frontend: Build and push Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}-frontend"
      - "./frontend"

  # Backend: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}-backend"
      - "--image"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}-backend"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

  # Frontend: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}-frontend"
      - "--image"
      - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}-frontend"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

images:
  - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}-backend"
  - "gcr.io/$PROJECT_ID/${_SERVICE_NAME}-frontend"

substitutions:
  _SERVICE_NAME: "{{PROJECT_NAME}}"
  _REGION: "asia-northeast1"
